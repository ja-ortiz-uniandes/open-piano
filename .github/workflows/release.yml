name: release

# Build a portable Windows package and publish it as a GitHub Release whenever a
# version tag is pushed. To cut a release:
#
#     git tag v0.1.0
#     git push origin v0.1.0
#
# The release page then has `open-piano-v0.1.0-win-x64.zip` — a single
# self-contained exe (the ONNX model and ONNX Runtime are embedded at build
# time; see src/bundle.rs) plus the README. Your professor downloads it, unzips
# it anywhere, and runs `open-piano.exe`. No installer, no admin rights.
# Updating is just replacing the exe with a newer release's (or letting the
# in-app auto-updater do exactly that).

on:
  push:
    tags:
      - "v*"

# Needed for the job to create a Release with the GitHub-provided token.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Set up Python (for the model/runtime downloader)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Must run before the build: both files are embedded into the exe via
      # include_bytes! (src/bundle.rs), so they're compile-time inputs now.
      - name: Fetch model.onnx + onnxruntime.dll
        run: python download_model.py

      - name: Build (release)
        # The checked-in .cargo/config.toml sets `-C target-cpu=native` for local
        # dev builds. On a CI runner that bakes the *runner's* CPU features (e.g.
        # AVX-512 on Azure Ice Lake) into the shipped exe, which then dies
        # instantly with STATUS_ILLEGAL_INSTRUCTION (0xC000001D) — no window, no
        # error — on any consumer CPU without them. The RUSTFLAGS env var
        # overrides the config file; x86-64-v2 (SSE4.2-era baseline, ~2009+)
        # keeps the DSP loops reasonably fast while running everywhere.
        env:
          RUSTFLAGS: -C target-cpu=x86-64-v2
        run: cargo build --release

      - name: Stage portable package
        shell: pwsh
        run: |
          $name = "open-piano-${{ github.ref_name }}-win-x64"
          New-Item -ItemType Directory -Force $name | Out-Null
          Copy-Item target/release/open-piano.exe $name/
          Copy-Item README.md $name/
          Compress-Archive -Path $name -DestinationPath "$name.zip" -Force

      # 0.x.x tags are still pre-1.0 previews: publish them as GitHub
      # pre-releases (never "Latest") and mark the title accordingly. Once we tag
      # v1.0.0+ this branch falls through to a normal latest release.
      - name: Decide release flags
        id: flags
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v0\.') {
            "title=$tag (preview)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "extra=--prerelease --latest=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "title=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "extra=--latest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      # Pull the human-written section for this version out of CHANGELOG.md and
      # use it as the release body. The tag `vX.Y.Z` maps to the `## [X.Y.Z]`
      # heading; we capture everything up to (but not including) the next
      # top-level `## [` heading. If there's no matching section we fall back to
      # GitHub's auto-generated notes alone.
      - name: Extract changelog section
        id: notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $lines = Get-Content CHANGELOG.md
          $start = $null
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^## \[$([regex]::Escape($version))\]") { $start = $i; break }
          }
          if ($null -eq $start) {
            Write-Host "No CHANGELOG section for $version; using generated notes only."
            "have_notes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            $body = @()
            for ($i = $start + 1; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^## \[') { break }
              $body += $lines[$i]
            }
            ($body -join "`n").Trim() | Out-File -FilePath notes.md -Encoding utf8
            "have_notes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $args = @(
            "${{ github.ref_name }}",
            "open-piano-${{ github.ref_name }}-win-x64.zip",
            "--title", "${{ steps.flags.outputs.title }}",
            "--generate-notes"
          )
          $args += "${{ steps.flags.outputs.extra }}".Split(" ")
          if ("${{ steps.notes.outputs.have_notes }}" -eq "true") {
            $args += @("--notes-file", "notes.md")
          }
          gh release create @args
