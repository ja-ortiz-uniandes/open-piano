# open-piano cargo configuration
#
# NOTE on opt-level:
#   Cargo only reads `[profile.*]` tables from `Cargo.toml` on the stable
#   toolchain. Placing `[profile.dev]` here errors out with
#   "config profiles require the `-Z config-profile` flag", so the real
#   setting lives in Cargo.toml:
#
#       [profile.dev]
#       opt-level = 1
#
# That gives the audio/pitch-detection math loops -O1 in dev builds, which is
# what we want on the Surface 9. The block below documents the intent; the
# effective copy is in Cargo.toml.
#
# [profile.dev]
# opt-level = 1

[build]
# Surface 9 is x86_64; let codegen use the native CPU features for the
# tight DSP loops.
#
# WARNING: `native` means "the CPU of whatever machine runs the build". A binary
# built on one machine with this flag can crash with STATUS_ILLEGAL_INSTRUCTION
# on another. The release workflow overrides this via the RUSTFLAGS env var
# (which takes precedence over this file) to a portable x86-64-v2 baseline —
# keep that override if you touch the CI build step.
rustflags = ["-C", "target-cpu=native"]
